<!DOCTYPE html>

<html class="dark" lang="ar" dir="rtl">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>WATHBA | Wooden Parallettes</title>
    <script>
        (function () {
            var lang = localStorage.getItem("wathbaLang") || "ar";
            document.documentElement.lang = lang;
            document.documentElement.dataset.wathbaLang = lang;
            document.documentElement.dir = lang === "ar" ? "rtl" : "ltr";
            document.documentElement.classList.add("wathba-ui-loading");
        })();
    </script>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Anton&amp;family=Be+Vietnam+Pro:wght@400;500;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />

    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .glass-effect {
            backdrop-filter: blur(20px);
            background-color: rgba(10, 10, 10, 0.8);
        }

        .hard-shadow {
            box-shadow: 4px 4px 0px #ffffff;
        }

        .active-chip {
            background-color: #ffffff;
            color: #000000;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #000000;
        }

        ::-webkit-scrollbar-thumb {
            background: #1A1A1A;
        }
    </style>
    <script src="assets/js/tailwind-config.js"></script>
    <link rel="stylesheet" href="assets/css/shared-ui.css" />
    <!-- WATHBA_PRODUCT_DETAILS_DYNAMIC_START -->
    <style id="wathba-product-details-dynamic">
        .wathba-detail-main-image.wathba-image-fallback::after,
        .wathba-related-image.wathba-image-fallback::after,
        .wathba-thumb.wathba-image-fallback::after {
            content: "WATHBA";
            position: absolute;
            inset: 0;
            display: grid;
            place-items: center;
            font-family: "Anton", sans-serif;
            color: rgba(255, 255, 255, 0.22);
            letter-spacing: 0.08em;
        }

        .wathba-detail-main-image.wathba-image-fallback::after {
            font-size: clamp(42px, 8vw, 92px);
        }

        .wathba-related-image.wathba-image-fallback::after,
        .wathba-thumb.wathba-image-fallback::after {
            font-size: 28px;
        }

        .wathba-size-chip.active {
            background: #ffffff !important;
            color: #000000 !important;
            border-color: #ffffff !important;
        }

        .wathba-thumb.active {
            border-color: #ffffff !important;
        }

        .wathba-thumb.active img {
            opacity: 1 !important;
        }

        .wathba-wa-svg {
            width: 22px;
            height: 22px;
            fill: currentColor;
        }

        @media (max-width: 767px) {
            #productDetailsRoot section {
                padding-top: 22px !important;
            }

            #productDetailsRoot h1 {
                font-size: 46px !important;
                line-height: 0.95 !important;
            }

            #productDetailsRoot p {
                font-size: 15px !important;
                line-height: 1.75 !important;
            }

            #productDetailsRoot .wathba-detail-main-image {
                aspect-ratio: 1 / 1 !important;
            }

            #productDetailsRoot .wathba-detail-thumbs {
                gap: 10px !important;
            }

            #productDetailsRoot .wathba-size-row {
                overflow-x: auto;
                flex-wrap: nowrap !important;
                padding-bottom: 8px;
            }

            #productDetailsRoot .wathba-size-chip {
                white-space: nowrap;
            }

            #productDetailsRoot .wathba-order-btn {
                width: 100%;
                font-size: 24px !important;
                padding-top: 18px !important;
                padding-bottom: 18px !important;
            }

            #relatedProductsRoot {
                margin-top: 70px !important;
            }

            #relatedProductsRoot h2 {
                font-size: 42px !important;
                line-height: 1 !important;
            }
        }
    </style>
    <!-- WATHBA_PRODUCT_DETAILS_DYNAMIC_END -->
</head>

<body class="bg-background text-on-surface font-body-md selection:bg-tertiary-fixed selection:text-on-tertiary-fixed">
    <!-- WATHBA Unified Navbar -->
    <nav class="fixed top-0 left-0 w-full z-50 bg-surface/80 backdrop-blur-xl border-b border-outline-variant/10">
        <div class="flex justify-between items-center w-full px-margin-desktop py-4 max-w-container-max mx-auto">
            <div class="flex items-center gap-12">
                <a class="wathba-logo wathba-nav-logo" href="index.html" data-wathba-logo="true">WATHBA</a>

                <div class="hidden md:flex items-center gap-8">
                    <a class="font-label-caps text-label-caps text-on-surface-variant hover:text-primary transition-colors"
                        href="index.html">Home</a>

                    <a class="font-label-caps text-label-caps text-on-surface-variant hover:text-primary transition-colors"
                        href="products.html">Products</a>

                    <a class="font-label-caps text-label-caps text-on-surface-variant hover:text-primary transition-colors"
                        href="about.html">About</a>

                    <a class="font-label-caps text-label-caps text-on-surface-variant hover:text-primary transition-colors"
                        href="contact.html">Contact</a>
                </div>
            </div>

            <div class="wathba-nav-empty"></div>
        </div>
    </nav>
    <main class="pt-32">
        <section id="productDetailsRoot"></section>
        <section id="relatedProductsRoot"></section>
    </main>
    <div id="wathbaFooter"></div>

    <script src="assets/js/config.js"></script>
    <script src="assets/js/products-data.js"></script>
    <script src="assets/js/whatsapp.js"></script>
    <script src="assets/js/product-details.js"></script>
    <script src="assets/js/shared-ui.js"></script>
</body>

</html>
